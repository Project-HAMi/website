# Source: https://github.com/Project-HAMi/k8s-dra-driver (demo/yaml/pod-tpl-0.yaml)
---
apiVersion: v1
kind: Pod
metadata:
  namespace: test-dra
  name: pod-tpl-1
spec:
  containers:
    - name: ctr0
      image: ubuntu:24.04
      command: ["bash", "-c"]
      args: ["export; trap 'exit 0' TERM; sleep 9999 & wait"]
      resources:
        requests:
          cpu: 1.5
        limits:
          cpu: 1.5
        claims:
          - name: gpu
  resourceClaims:
    - name: gpu
      resourceClaimTemplateName: single-gpu-tpl
