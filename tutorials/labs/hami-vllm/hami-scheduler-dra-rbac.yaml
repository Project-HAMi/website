apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hami-scheduler-dra-resources
rules:
  - apiGroups:
      - resource.k8s.io
    resources:
      - resourceclaims
      - resourceclaimtemplates
      - resourceslices
      - deviceclasses
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hami-scheduler-dra-resources
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hami-scheduler-dra-resources
subjects:
  - kind: ServiceAccount
    name: hami-scheduler
    namespace: kube-system
