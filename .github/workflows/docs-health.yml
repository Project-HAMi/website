name: Docs Health Check

on:
  pull_request:
    branches: [master]
  schedule:
    - cron: "3 6 * * 1" # Weekly Monday 06:03 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Lint, Format, Build & Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Lint Markdown
        run: npm run lint

      - name: Format Check
        run: npm run format:check

      - name: Build Site
        env:
          DOCUSAURUS_SITE_URL: http://127.0.0.1:3000
        run: npm run build

      - name: Broken Internal Link Check
        run: bash scripts/check-links.sh
